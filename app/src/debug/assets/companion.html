<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c5ce7'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>SV</text></svg>">
<title>StreamVault Remote</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface2: #1e1e2e;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --text: #e8e8f0;
  --text2: #8888a0;
  --success: #00b894;
  --danger: #e17055;
  --border: #2a2a3e;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.status-dot.on { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.off { background: var(--danger); }

.status-text { font-size: 11px; color: var(--text2); }

/* Search */
.search-bar {
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.search-bar input:focus {
  border-color: var(--accent);
}

.search-bar .icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text2); font-size: 16px;
}

/* Tabs */
.tabs {
  display: flex; overflow-x: auto; gap: 6px;
  padding: 10px 16px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Channel List */
.channel-list {
  padding: 0 16px 100px;
}

.channel-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
}

.channel-item:active {
  transform: scale(0.98);
  background: var(--surface2);
  border-color: var(--accent);
}

.channel-item.playing {
  border-color: var(--success);
  box-shadow: 0 0 0 1px var(--success);
}

.channel-logo {
  width: 44px; height: 44px;
  border-radius: 8px;
  background: var(--surface2);
  object-fit: contain;
  flex-shrink: 0;
}

.channel-logo.placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--accent);
}

.channel-info {
  flex: 1; min-width: 0;
}

.channel-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.channel-meta {
  font-size: 11px; color: var(--text2);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.channel-actions {
  display: flex; gap: 8px; flex-shrink: 0;
}

.btn-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-play {
  background: var(--accent);
  color: white;
}
.btn-play:active { background: var(--accent2); }

.btn-fav {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
}
.btn-fav.active {
  color: #fdcb6e;
  border-color: #fdcb6e;
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text2);
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Now Playing Bar */
.now-playing {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(20,20,31,0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: none;
  align-items: center; gap: 12px;
  z-index: 100;
}

.now-playing.visible { display: flex; }

.now-playing .np-info { flex: 1; }
.now-playing .np-title { font-size: 13px; font-weight: 600; }
.now-playing .np-sub { font-size: 11px; color: var(--text2); }

.btn-stop {
  padding: 8px 16px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
}

/* Category badge */
.cat-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--surface2);
  border-radius: 4px;
  font-size: 10px;
  color: var(--accent2);
  font-weight: 500;
}

/* AI Chat */
.ai-chat {
  padding: 0 16px;
}
.ai-messages {
  min-height: 200px; max-height: 60vh;
  overflow-y: auto; padding-bottom: 12px;
}
.ai-msg {
  padding: 10px 14px; border-radius: var(--radius);
  margin-bottom: 8px; font-size: 14px; line-height: 1.5;
}
.ai-msg.user {
  background: var(--accent); color: white;
  margin-left: 40px; text-align: right;
}
.ai-msg.assistant {
  background: var(--surface); border: 1px solid var(--border);
  margin-right: 20px;
}
.ai-msg .play-btn {
  display: inline-block; padding: 4px 12px; margin: 4px 2px;
  background: var(--accent); color: white; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; border: none;
}
.ai-input-bar {
  display: flex; gap: 8px; padding: 12px 16px;
  position: sticky; bottom: 0;
  background: rgba(10,10,15,0.95); backdrop-filter: blur(10px);
}
.ai-input-bar input {
  flex: 1; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 15px; outline: none;
}
.ai-input-bar input:focus { border-color: var(--accent); }
.ai-input-bar button {
  padding: 10px 18px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer;
}
.ai-typing { color: var(--text2); font-style: italic; font-size: 13px; padding: 8px 14px; }

/* Sports Dashboard */
.sports-leagues {
  display: flex; gap: 6px; padding: 8px 16px; overflow-x: auto;
  scrollbar-width: none;
}
.sports-leagues::-webkit-scrollbar { display: none; }
.league-btn {
  flex-shrink: 0; padding: 6px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer;
}
.league-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.game-card {
  margin: 8px 16px; padding: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  transition: all 0.15s;
}
.game-card:active { transform: scale(0.98); border-color: var(--accent); }
.game-card.live { border-left: 3px solid var(--danger); }
.game-card.final { opacity: 0.7; }

.game-teams {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.game-team {
  display: flex; align-items: center; gap: 8px; flex: 1;
}
.game-team.away { justify-content: flex-start; }
.game-team.home { justify-content: flex-end; text-align: right; }
.game-team-name { font-size: 14px; font-weight: 600; }
.game-team-abbr { font-size: 11px; color: var(--text2); }
.game-score {
  font-size: 22px; font-weight: 800; min-width: 50px; text-align: center;
  font-variant-numeric: tabular-nums;
}
.game-score.live-score { color: var(--success); }
.game-vs { font-size: 12px; color: var(--text2); font-weight: 500; }

.game-status {
  text-align: center; margin-top: 8px; font-size: 11px; font-weight: 600;
}
.game-status.live { color: var(--danger); }
.game-status.pre { color: var(--accent2); }
.game-status.post { color: var(--text2); }

.game-actions {
  display: flex; gap: 6px; margin-top: 10px; justify-content: center;
}
.game-watch-btn {
  padding: 6px 14px; background: var(--accent); color: white;
  border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
}
.game-watch-btn:active { background: var(--accent2); }
.game-watch-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty .emoji { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>StreamVault</h1>
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">connecting...</span>
    </div>
  </div>
  <div class="search-bar" style="display:flex; gap:8px; align-items:center;">
    <div style="position:relative; flex:1;">
      <span class="icon">&#x1F50D;</span>
      <input type="search" id="searchInput" placeholder="Search channels..." autocomplete="off">
    </div>
    <button id="voiceBtn" onclick="startVoiceSearch()" style="
      width:40px; height:40px; border-radius:50%; border:1px solid var(--border);
      background:var(--surface); color:var(--text2); font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    ">&#x1F3A4;</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="favorites">Favorites</div>
  <div class="tab" data-tab="all">All Channels</div>
  <div class="tab" data-tab="sports_live">Live Sports</div>
  <div class="tab" data-tab="news">News</div>
  <div class="tab" data-tab="4k">4K</div>
  <div class="tab" data-tab="canada">Canada</div>
  <div class="tab" data-tab="toronto">Toronto</div>
  <div class="tab" data-tab="categories">Categories</div>
  <div class="tab" data-tab="ai" id="aiTab">AI</div>
  <div class="tab" data-tab="settings">Settings</div>
  <div class="tab" id="zapToggle" onclick="toggleZapMode(event)" style="margin-left:auto; border-color:var(--text2);">Zap: OFF</div>
</div>

<div class="channel-list" id="channelList">
  <div class="loading"><div class="spinner"></div>Loading...</div>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="np-info">
    <div class="np-title" id="npTitle"></div>
    <div class="np-sub" id="npSub">Now Playing</div>
  </div>
  <button class="btn-stop" onclick="stopPlayback()">Stop</button>
</div>

<script>
const API = window.location.origin;
let currentTab = 'favorites';
let favoriteIds = new Set();
let playingChannelId = null;
let searchTimeout = null;
let allCategories = [];

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Init — on PWA open, wake TV and launch StreamVault
document.addEventListener('DOMContentLoaded', async () => {
  // Wake TV and launch StreamVault when PWA opens
  try {
    await fetch(API + '/wake', { method: 'POST', signal: AbortSignal.timeout(3000) });
  } catch { /* TV might be off or unreachable */ }

  await loadStatus();
  await loadFavoriteIds();
  await loadTab('favorites');

  // Search debounce
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    const q = e.target.value.trim();
    if (q.length >= 2) {
      searchTimeout = setTimeout(() => searchChannels(q), 300);
    } else if (q.length === 0) {
      loadTab(currentTab);
    }
  });

  // Tab clicks
  document.getElementById('tabs').addEventListener('click', (e) => {
    if (e.target.classList.contains('tab')) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      currentTab = e.target.dataset.tab;
      document.getElementById('searchInput').value = '';
      loadTab(currentTab);
    }
  });
});

async function api(path) {
  const res = await fetch(API + path);
  return res.json();
}

async function apiPost(path, data) {
  const res = await fetch(API + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { return { error: 'Invalid response', raw: text.substring(0, 200) }; }
}

async function loadStatus() {
  try {
    const data = await api('/status');
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'status-dot on';
    text.textContent = `${data.channel_count} ch | ${data.favorite_count} fav | VPN ${data.vpn_active ? 'on' : 'off'}`;
  } catch {
    document.getElementById('statusDot').className = 'status-dot off';
    document.getElementById('statusText').textContent = 'offline';
  }
}

async function loadFavoriteIds() {
  const data = await api('/favorites');
  favoriteIds = new Set(data.favorites.map(f => f.channel_id));
}

async function loadTab(tab) {
  const list = document.getElementById('channelList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

  try {
    let channels = [];

    switch (tab) {
      case 'favorites': {
        const data = await api('/favorites');
        channels = data.favorites.map(f => ({
          id: f.channel_id,
          stream_id: f.stream_id,
          name: f.channel_name,
          category_name: f.category_name,
          logo_url: '',
          number: f.position
        }));
        break;
      }
      case 'all': {
        const data = await api('/channels?limit=100');
        channels = data.channels;
        break;
      }
      case 'sports_live': {
        await showSportsLive();
        return;
      }
      case 'news': {
        const data = await api('/channels?search=NEWS&limit=50');
        const data2 = await api('/channels?search=CNN&limit=10');
        const data3 = await api('/channels?search=MSNBC&limit=10');
        const seen = new Set();
        channels = [...data.channels, ...data2.channels, ...data3.channels]
          .filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; });
        break;
      }
      case '4k': {
        const data = await api('/channels?search=4K&limit=60');
        channels = data.channels.filter(c => !c.name.includes('NO EVENT'));
        break;
      }
      case 'canada': {
        const data = await api('/channels?search=CA%3A&limit=80');
        const data2 = await api('/channels?search=CA+EN&limit=80');
        const seen = new Set();
        channels = [...data.channels, ...data2.channels]
          .filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; });
        break;
      }
      case 'toronto': {
        const data = await api('/channels?search=Toronto&limit=30');
        const data2 = await api('/channels?search=CP24&limit=5');
        const data3 = await api('/channels?search=Ontario&limit=20');
        const seen = new Set();
        channels = [...data.channels, ...data2.channels, ...data3.channels]
          .filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; })
          .filter(c => !c.name.includes('FLSP'));
        break;
      }
      case 'categories': {
        await loadCategories();
        return;
      }
      case 'ai': {
        showAiChat();
        return;
      }
      case 'settings': {
        await showSettings();
        return;
      }
    }

    renderChannels(channels);
    // Fetch EPG "now playing" for visible channels
    fetchNowPlaying(channels.map(c => c.id));
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="emoji">&#x26A0;</div>Error loading channels<br><small>${e.message}</small></div>`;
  }
}

async function fetchNowPlaying(channelIds) {
  if (!channelIds.length) return;
  try {
    const data = await apiPost('/epg/now', { channel_ids: channelIds.slice(0, 50) });
    const nowPlaying = data.now_playing || {};
    for (const [chId, title] of Object.entries(nowPlaying)) {
      const meta = document.querySelector(`#ch-${chId} .channel-meta`);
      if (meta) meta.innerHTML = `<span style="color:var(--success);">Now:</span> ${esc(title)}`;
    }
  } catch { /* EPG not available */ }
}

async function loadCategories() {
  const list = document.getElementById('channelList');
  if (allCategories.length === 0) {
    const data = await api('/categories?type=LIVE');
    allCategories = data.categories;
  }

  list.innerHTML = allCategories
    .filter(cat => (cat.channel_count || 0) > 0)
    .map(cat => `
    <div class="channel-item" onclick="loadCategory(${cat.category_id}, '${cat.name.replace(/'/g, "\\'")}')">
      <div class="channel-logo placeholder">${cat.name.charAt(0)}</div>
      <div class="channel-info">
        <div class="channel-name">${esc(cat.name)}</div>
        <div class="channel-meta">${cat.channel_count || 0} channels</div>
      </div>
      <div style="color: var(--text2); font-size: 20px;">&#x276F;</div>
    </div>
  `).join('');
}

async function loadCategory(categoryId, name) {
  const list = document.getElementById('channelList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

  // Add back button
  const data = await api(`/channels?category_id=${categoryId}&limit=200`);

  const backBtn = `<div class="channel-item" onclick="loadCategories()" style="border-color: var(--accent);">
    <div style="font-size: 20px;">&#x2190;</div>
    <div class="channel-info"><div class="channel-name">Back to Categories</div></div>
  </div>`;

  list.innerHTML = backBtn;
  renderChannels(data.channels, true);
}

async function searchChannels(query) {
  const list = document.getElementById('channelList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';

  const data = await api(`/channels?search=${encodeURIComponent(query)}&limit=50`);
  if (data.channels.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">&#x1F50D;</div>No channels found for "${esc(query)}"</div>`;
    return;
  }
  renderChannels(data.channels);
}

function renderChannels(channels, append = false) {
  const list = document.getElementById('channelList');
  if (!append) list.innerHTML = '';

  if (channels.length === 0) {
    list.innerHTML = '<div class="empty"><div class="emoji">&#x1F4FA;</div>No channels</div>';
    return;
  }

  const html = channels.map(ch => {
    const isFav = favoriteIds.has(ch.id);
    const isPlaying = playingChannelId === ch.id;
    const initial = (ch.name || '?').replace(/[^A-Za-z0-9]/g, '').charAt(0) || '?';
    const logo = ch.logo_url ? `<img class="channel-logo" src="${ch.logo_url}" onerror="this.outerHTML='<div class=\\'channel-logo placeholder\\'>${initial}</div>'">`
      : `<div class="channel-logo placeholder">${initial}</div>`;

    return `
    <div class="channel-item ${isPlaying ? 'playing' : ''}" id="ch-${ch.id}">
      ${logo}
      <div class="channel-info" onclick="if(zapMode) playChannel(${ch.id}, '${esc(ch.name)}')">
        <div class="channel-name">${esc(ch.name)}</div>
        <div class="channel-meta">${esc(ch.category_name || '')} ${ch.stream_id ? '| #' + ch.stream_id : ''}</div>
      </div>
      <div class="channel-actions">
        <button class="btn-icon btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav(${ch.id}, this)">
          ${isFav ? '&#x2605;' : '&#x2606;'}
        </button>
        <button class="btn-icon btn-play" onclick="playChannel(${ch.id}, '${esc(ch.name)}')">
          &#x25B6;
        </button>
      </div>
    </div>`;
  }).join('');

  list.innerHTML += html;
}

async function playChannel(channelId, name) {
  try {
    const data = await apiPost('/play', { channel_id: channelId });
    if (data.error) {
      alert(data.message || data.error);
      return;
    }
    if (data.success) {
      playingChannelId = channelId;
      const np = document.getElementById('nowPlaying');
      document.getElementById('npTitle').textContent = data.playing || name;
      np.classList.add('visible');

      // Highlight playing channel
      document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('playing'));
      const el = document.getElementById(`ch-${channelId}`);
      if (el) el.classList.add('playing');
    }
  } catch (e) {
    alert('Failed to play: ' + e.message);
  }
}

async function toggleFav(channelId, btn) {
  const isFav = favoriteIds.has(channelId);
  try {
    if (isFav) {
      await apiPost('/favorites/remove', { channel_id: channelId });
      favoriteIds.delete(channelId);
      btn.classList.remove('active');
      btn.innerHTML = '&#x2606;';
    } else {

      btn.classList.add('active');
      btn.innerHTML = '&#x2605;';
    }
  } catch (e) {
    console.error('Fav toggle failed:', e);
  }
}

             onkeydown="if(event.key==='Enter')sendAiMessage()">

  const msgs = document.getElementById('aiMessages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  setTimeout(() => document.getElementById('aiInput')?.focus(), 100);

async function sendAiMessage() {
  const input = document.getElementById('aiInput');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  aiMessages.push({ role: 'user', text: query });
  showAiChat();

  // Show typing indicator
  const msgs = document.getElementById('aiMessages');
  msgs.innerHTML += '<div class="ai-typing" id="aiTyping">Thinking...</div>';
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const data = await apiPost('/ai', { query, mode: 'chat' });
    const typing = document.getElementById('aiTyping');
    if (typing) typing.remove();

    let html = '';
    const resp = data.ai_response;
    if (typeof resp === 'object' && resp.message) {
      html = esc(resp.message);
      if (resp.channels && resp.channels.length > 0) {
        html += '<div style="margin-top:8px">';
        for (const ch of resp.channels) {
          html += `<button class="play-btn" onclick="playChannel(${ch.id}, '${esc(ch.name)}')">${esc(ch.name)}</button> `;
        }
        html += '</div>';
      }
    } else if (typeof resp === 'string') {
      // Parse [play:123] tags
      html = esc(resp).replace(/\[play:(\d+)\]/g, (_, id) =>
        `<button class="play-btn" onclick="playChannel(${id}, 'Channel ${id}')">Play ${id}</button>`
      );
    } else {
      html = esc(JSON.stringify(resp));
    }

    aiMessages.push({ role: 'assistant', html });
  } catch (e) {
    aiMessages.push({ role: 'assistant', text: 'Error: ' + e.message });
  }
  showAiChat();
}

let currentLeague = 'nba';
let sportsView = 'today'; // today, standings, playoffs

async function showSportsLive() {
  const list = document.getElementById('channelList');
  const leagueBar = `<div class="sports-leagues">
    ${['NBA','NHL','MLB','NFL','MLS'].map(l =>
      `<div class="league-btn ${l.toLowerCase()===currentLeague?'active':''}"
            onclick="currentLeague='${l.toLowerCase()}'; showSportsLive()">${l}</div>`
    ).join('')}
    <div style="width:1px; background:var(--border); margin:0 4px;"></div>
    ${['today','standings','playoffs'].map(v =>
      `<div class="league-btn ${v===sportsView?'active':''}" style="font-size:11px;"
            onclick="sportsView='${v}'; showSportsLive()">${v.charAt(0).toUpperCase()+v.slice(1)}</div>`
    ).join('')}
  </div>`;

  list.innerHTML = leagueBar + `<div class="loading"><div class="spinner"></div>Loading...</div>`;

  try {
    if (sportsView === 'standings') { await renderStandings(list, leagueBar); return; }
    if (sportsView === 'playoffs') { await renderPlayoffs(list, leagueBar); return; }
    await renderToday(list, leagueBar);
  } catch (e) {
    list.innerHTML = leagueBar + `<div class="empty"><div class="emoji">&#x26A0;</div>${e.message}</div>`;
  }
}

async function renderToday(list, leagueBar) {
  const [scores, news] = await Promise.all([
    api(`/sports?league=${currentLeague}`),
    api(`/sports/news?league=${currentLeague}`).catch(() => ({articles:[]}))
  ]);
  const games = scores.games || [];

  let html = leagueBar;

  if (games.length === 0) {
    html += `<div class="empty"><div class="emoji">&#x1F3C0;</div>No ${scores.league} games today</div>`;
  } else {
    // Group: live first, then upcoming, then final
    const live = games.filter(g => g.state === 'in');
    const pre = games.filter(g => g.state === 'pre');
    const post = games.filter(g => g.state === 'post');

    if (live.length) html += `<div style="padding:8px 16px;font-size:12px;font-weight:700;color:var(--danger);">LIVE</div>`;
    html += live.map(g => renderGameCard(g)).join('');
    if (pre.length) html += `<div style="padding:8px 16px;font-size:12px;font-weight:700;color:var(--accent2);">UPCOMING</div>`;
    html += pre.map(g => renderGameCard(g)).join('');
    if (post.length) html += `<div style="padding:8px 16px;font-size:12px;font-weight:700;color:var(--text2);">FINAL</div>`;
    html += post.map(g => renderGameCard(g)).join('');
  }

  // News
  const articles = news.articles || [];
  if (articles.length) {
    html += `<div style="padding:12px 16px 4px;font-size:14px;font-weight:700;">Headlines</div>`;
    html += articles.slice(0,4).map(a => `
      <div class="channel-item" onclick="window.open('${a.link}','_blank')" style="gap:10px;">
        ${a.image ? `<img src="${a.image}" style="width:60px;height:40px;border-radius:6px;object-fit:cover;">` : ''}
        <div class="channel-info">
          <div class="channel-name" style="font-size:13px;">${esc(a.headline)}</div>
          <div class="channel-meta">${esc(a.description).substring(0,80)}...</div>
        </div>
      </div>`).join('');
  }

  list.innerHTML = html;
}

function renderGameCard(g) {
  const isLive = g.state === 'in';
  const isFinal = g.state === 'post';
  const isPre = g.state === 'pre';
  const gameDate = new Date(g.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const ytQuery = encodeURIComponent(`${g.away_team} vs ${g.home_team} highlights ${gameDate}`);

  return `
  <div class="game-card ${isLive?'live':''} ${isFinal?'final':''}">
    <div class="game-teams">
      <div class="game-team away">
        ${g.away_logo ? `<img src="${g.away_logo}" style="width:32px;height:32px;" onerror="this.style.display='none'">` : ''}
        <div>
          <div class="game-team-name">${esc(g.away_team)}</div>
          <div class="game-team-abbr">${esc(g.away_record || g.away_abbr)}</div>
        </div>
      </div>
      ${isPre
        ? `<div class="game-vs">VS</div>`
        : `<div class="game-score ${isLive?'live-score':''}">${g.away_score} - ${g.home_score}</div>`
      }
      <div class="game-team home">
        <div>
          <div class="game-team-name">${esc(g.home_team)}</div>
          <div class="game-team-abbr">${esc(g.home_record || g.home_abbr)}</div>
        </div>
        ${g.home_logo ? `<img src="${g.home_logo}" style="width:32px;height:32px;" onerror="this.style.display='none'">` : ''}
      </div>
    </div>
    <div class="game-status ${g.state}">${esc(g.status)}</div>
    ${g.series_note ? `<div style="text-align:center;font-size:11px;color:var(--accent2);margin-top:2px;">${esc(g.series_note)}</div>` : ''}
    <div class="game-actions">
      ${!isFinal ? `<button class="game-watch-btn" onclick="event.stopPropagation();findGameStream('${esc(g.away_abbr)}','${esc(g.home_abbr)}','${esc(g.away_team)}','${esc(g.home_team)}')">&#x25B6; Watch</button>` : ''}
      <button class="game-watch-btn secondary" onclick="event.stopPropagation();showBoxScore('${g.event_id}','${esc(g.away_abbr)}','${esc(g.home_abbr)}')">&#x1F4CA; Box Score</button>
      ${isFinal ? `<button class="game-watch-btn secondary" onclick="event.stopPropagation();window.open('https://www.youtube.com/results?search_query=${ytQuery}','_blank')">&#x1F3AC; Highlights</button>` : ''}
    </div>
  </div>`;
}

async function renderStandings(list, leagueBar) {
  const data = await api(`/sports/standings?league=${currentLeague}`);
  const confs = data.conferences || [];
  let html = leagueBar;
  for (const conf of confs) {
    html += `<div style="padding:10px 16px 4px;font-size:14px;font-weight:700;">${esc(conf.name)}</div>`;
    html += `<div style="margin:0 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">`;
    html += `<table style="width:100%;border-collapse:collapse;font-size:12px;">
      <tr style="background:var(--surface2);"><th style="padding:6px;text-align:left;">#</th><th style="text-align:left;">Team</th><th>W</th><th>L</th><th>PCT</th><th>STRK</th><th>L10</th></tr>`;
    for (let i = 0; i < (conf.teams || []).length; i++) {
      const t = conf.teams[i];
      const seed = t.seed || (i+1);
      html += `<tr style="border-top:1px solid var(--border);">
        <td style="padding:6px;color:var(--text2);">${seed}</td>
        <td style="padding:6px;font-weight:600;display:flex;align-items:center;gap:6px;">
          ${t.logo ? `<img src="${t.logo}" style="width:20px;height:20px;">` : ''}${esc(t.abbr)}</td>
        <td style="text-align:center;padding:6px;">${t.wins}</td>
        <td style="text-align:center;padding:6px;">${t.losses}</td>
        <td style="text-align:center;padding:6px;">${t.pct}</td>
        <td style="text-align:center;padding:6px;color:${t.streak?.startsWith('W')?'var(--success)':'var(--danger)'};">${esc(t.streak)}</td>
        <td style="text-align:center;padding:6px;">${esc(t.last10)}</td>
      </tr>`;
    }
    html += `</table></div>`;
  }
  list.innerHTML = html;
}

async function renderPlayoffs(list, leagueBar) {
  const data = await api(`/sports?league=${currentLeague}`);
  const games = data.games || [];
  let html = leagueBar;

  if (!data.is_postseason) {
    html += `<div class="empty"><div class="emoji">&#x1F3C6;</div>${data.league} is not in playoffs right now</div>`;
    list.innerHTML = html;
    return;
  }

  // Group games by series (matchup)
  const series = {};
  for (const g of games) {
    const key = [g.away_abbr, g.home_abbr].sort().join('-');
    if (!series[key]) series[key] = { games: [], away: g.away_team, home: g.home_team,
      away_abbr: g.away_abbr, home_abbr: g.home_abbr, away_logo: g.away_logo, home_logo: g.home_logo,
      note: g.series_note };
    series[key].games.push(g);
    if (g.series_note) series[key].note = g.series_note;
  }

  html += `<div style="padding:10px 16px 4px;font-size:16px;font-weight:700;">${data.league} Playoffs</div>`;

  for (const [key, s] of Object.entries(series)) {
    // Parse series record from note (e.g. "DET leads 3-2" or "Series tied 3-3")
    let awayWins = 0, homeWins = 0;
    const note = s.note || '';
    const leadMatch = note.match(/(\w+)\s+leads?\s+(\d+)-(\d+)/i);
    const tiedMatch = note.match(/tied\s+(\d+)-(\d+)/i);
    const winsMatch = note.match(/(\w+)\s+wins?\s+(\d+)-(\d+)/i);
    if (leadMatch) {
      const leader = leadMatch[1];
      if (leader === s.away_abbr) { awayWins = parseInt(leadMatch[2]); homeWins = parseInt(leadMatch[3]); }
      else { homeWins = parseInt(leadMatch[2]); awayWins = parseInt(leadMatch[3]); }
    } else if (tiedMatch) {
      awayWins = homeWins = parseInt(tiedMatch[1]);
    } else if (winsMatch) {
      const winner = winsMatch[1];
      if (winner === s.away_abbr) { awayWins = parseInt(winsMatch[2]); homeWins = parseInt(winsMatch[3]); }
      else { homeWins = parseInt(winsMatch[2]); awayWins = parseInt(winsMatch[3]); }
    }

    const total = awayWins + homeWins;
    const awayPct = total > 0 ? (awayWins / 7 * 100) : 0;
    const homePct = total > 0 ? (homeWins / 7 * 100) : 0;

    html += `
    <div class="game-card" style="border-left:3px solid #${s.games[0]?.away_color || '6c5ce7'};">
      <div class="game-teams">
        <div class="game-team away">
          ${s.away_logo ? `<img src="${s.away_logo}" style="width:28px;height:28px;">` : ''}
          <div>
            <div class="game-team-name">${esc(s.away_team)}</div>
          </div>
        </div>
        <div style="text-align:center;">
          <div class="game-score">${awayWins} - ${homeWins}</div>
          <div style="font-size:10px;color:var(--text2);">Best of 7</div>
        </div>
        <div class="game-team home">
          <div>
            <div class="game-team-name">${esc(s.home_team)}</div>
          </div>
          ${s.home_logo ? `<img src="${s.home_logo}" style="width:28px;height:28px;">` : ''}
        </div>
      </div>
      <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin:8px 0;background:var(--surface2);">
        <div style="width:${awayPct}%;background:#${s.games[0]?.away_color || '6c5ce7'};"></div>
        <div style="width:${100-awayPct-homePct}%;"></div>
        <div style="width:${homePct}%;background:#${s.games[0]?.home_color || 'e17055'};"></div>
      </div>
      <div class="game-status ${note.includes('wins') ? 'post' : 'live'}">${esc(note || 'Series in progress')}</div>
    </div>`;
  }

  if (Object.keys(series).length === 0) {
    html += `<div class="empty"><div class="emoji">&#x1F3C6;</div>No active playoff series</div>`;
  }

  list.innerHTML = html;
}

async function showBoxScore(eventId, awayAbbr, homeAbbr) {
  const list = document.getElementById('channelList');
  list.innerHTML = `<div class="loading"><div class="spinner"></div>Loading box score...</div>`;

  try {
    const data = await api(`/sports/boxscore?event=${eventId}&league=${currentLeague}`);
    const teams = data.teams || [];
    const quarters = data.quarters || [];
    const gameDate = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const ytQuery = encodeURIComponent(`${awayAbbr} vs ${homeAbbr} highlights ${gameDate}`);

    let html = `<div class="channel-item" onclick="showSportsLive()" style="border-color:var(--accent);margin:8px 16px;">
      <div style="font-size:18px;">&#x2190;</div><div class="channel-info"><div class="channel-name">Back to Scores</div></div></div>`;

    // Quarter scores
    if (quarters.length >= 2) {
      html += `<div style="margin:0 16px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);">`;
      html += `<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px;">
        <span>${quarters[1]?.team || awayAbbr}</span><span>${quarters[0]?.team || homeAbbr}</span></div>`;
      const maxQ = Math.max(quarters[0]?.scores?.length || 0, quarters[1]?.scores?.length || 0);
      for (let q = 0; q < maxQ; q++) {
        const label = q < 4 ? `Q${q+1}` : `OT${q-3}`;
        html += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0;">
          <span>${quarters[1]?.scores?.[q] || '-'}</span><span style="color:var(--text2)">${label}</span><span>${quarters[0]?.scores?.[q] || '-'}</span></div>`;
      }
      html += `<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;border-top:1px solid var(--border);padding-top:4px;margin-top:4px;">
        <span>${quarters[1]?.total || '?'}</span><span>FINAL</span><span>${quarters[0]?.total || '?'}</span></div>`;
      html += `</div>`;
    }

    // Stats table
    if (teams.length >= 2) {
      html += `<div style="margin:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">`;
      html += `<table style="width:100%;border-collapse:collapse;font-size:12px;">
        <tr style="background:var(--surface2);"><th style="padding:6px;text-align:left;">Stat</th>
        <th style="text-align:center;">${esc(teams[0].abbr)}</th><th style="text-align:center;">${esc(teams[1].abbr)}</th></tr>`;
      const keyStats = ['Field Goal %','Three Point %','Free Throw %','Rebounds','Assists','Steals','Blocks','Turnovers'];
      const t0Stats = teams[0].stats || [];
      const t1Stats = teams[1].stats || [];
      for (const statName of keyStats) {
        const s0 = t0Stats.find(s => s.name === statName);
        const s1 = t1Stats.find(s => s.name === statName);
        if (s0 || s1) {
          html += `<tr style="border-top:1px solid var(--border);">
            <td style="padding:5px 6px;">${statName}</td>
            <td style="text-align:center;padding:5px;">${s0?.value || '-'}</td>
            <td style="text-align:center;padding:5px;">${s1?.value || '-'}</td></tr>`;
        }
      }
      html += `</table></div>`;
    }

    // YouTube highlights
    html += `<div style="margin:8px 16px;">
      <button class="game-watch-btn" style="width:100%;padding:12px;" onclick="window.open('https://www.youtube.com/results?search_query=${ytQuery}','_blank')">
        &#x1F3AC; Watch Highlights on YouTube</button></div>`;

    list.innerHTML = html;
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="emoji">&#x26A0;</div>Failed to load box score<br><small>${e.message}</small></div>`;
  }
}

async function findGameStream(team1, team2, fullName1, fullName2) {
  const searches = [team1, team2, fullName1.split(' ').pop(), fullName2.split(' ').pop()];
  let bestChannel = null, bestScore = -1;
  for (const q of searches) {
    try {
      const data = await api(`/channels?search=${encodeURIComponent(q)}&limit=20`);
      for (const ch of data.channels) {
        const n = ch.name.toUpperCase();
        let score = 0;
        if (n.includes('NEXT')) score += 100;
        if (n.includes('VS') || n.includes('@')) score += 80;
        if (n.includes(team1.toUpperCase()) || n.includes(team2.toUpperCase())) score += 50;
        if (n.includes('HD') || n.includes('ᴴᴰ')) score += 30;
        if (n.includes('4K') || n.includes('UHD')) score += 40;
        if (n.includes('NO EVENT') || n.includes('SD') || n.startsWith('-')) score -= 200;
        if (score > bestScore) { bestScore = score; bestChannel = ch; }
      }
    } catch {}
  }
  if (bestChannel && bestScore > 0) playChannel(bestChannel.id, bestChannel.name);
  else alert(`No stream found for ${fullName1} vs ${fullName2}`);
}

// === Voice Search ===
let recognition = null;
let isListening = false;

function startVoiceSearch() {
  const btn = document.getElementById('voiceBtn');

  if (isListening) {
    recognition?.stop();
    isListening = false;
    btn.style.background = 'var(--surface)';
    btn.style.color = 'var(--text2)';
    return;
  }

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    // Fallback: prompt for text input
    const query = prompt('Voice search not supported. Type your search:');
    if (query) {
      document.getElementById('searchInput').value = query;
      // Send to AI if on AI tab, otherwise regular search
      if (currentTab === 'ai') {
        document.getElementById('aiInput').value = query;
        sendAiMessage();
      } else {
        searchChannels(query);
      }
    }
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-CA';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    btn.style.background = 'var(--danger)';
    btn.style.color = 'white';
    btn.innerHTML = '&#x23F9;';
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById('searchInput').value = transcript;

    // Smart routing: if it sounds like a question, use AI
    const isQuestion = /find|show|what|play|switch|put on|turn on|i want/i.test(transcript);
    if (isQuestion) {
      // Switch to AI tab and search
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="ai"]')?.classList.add('active');
      currentTab = 'ai';
      showAiChat();
      setTimeout(() => {
        document.getElementById('aiInput').value = transcript;
        sendAiMessage();
      }, 200);
    } else {
      searchChannels(transcript);
    }
  };

  recognition.onend = () => {
    isListening = false;
    btn.style.background = 'var(--surface)';
    btn.style.color = 'var(--text2)';
    btn.innerHTML = '&#x1F3A4;';
  };

  recognition.onerror = (event) => {
    console.error('Speech error:', event.error);
    isListening = false;
    btn.style.background = 'var(--surface)';
    btn.style.color = 'var(--text2)';
    btn.innerHTML = '&#x1F3A4;';
  };

  recognition.start();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
